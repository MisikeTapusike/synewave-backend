version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: synewave-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: synewave
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synewave-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/synewave"
      JWT_SECRET: "synewave-local-dev-secret-change-in-production-min-32!"
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
